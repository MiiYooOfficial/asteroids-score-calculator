<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Asteroids Score Calculator</title>

<style>

    html, body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        width: 100%;
        height: 100%;
        font-family: Arial, sans-serif;
        background: black;
    }

    canvas {
        position: fixed;
        top: 0;
        left: 0;
        z-index: 0;
    }

    body {
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .container {
        position: relative;
        z-index: 2;

        width: 460px;

        background: rgba(0,0,0,0.88);

        border: 2px solid white;

        border-radius: 14px;

        padding: 28px;

        color: white;

        box-shadow: 0 0 30px rgba(255,255,255,0.15);
    }

    h1 {
        text-align: center;
        margin-top: 0;
        margin-bottom: 25px;
        font-size: 32px;
        letter-spacing: 2px;
        line-height: 1.2;
    }

    .subtitle {
        text-align: center;
        margin-bottom: 25px;
        color: #bbbbbb;
        font-size: 15px;
    }

    label {
        display: block;
        margin-top: 18px;
        margin-bottom: 8px;
        font-weight: bold;
        font-size: 17px;
    }

    input, select, button {

        width: 100%;

        padding: 12px;

        font-size: 16px;

        box-sizing: border-box;

        border-radius: 8px;

        border: 2px solid white;

        background: black;

        color: white;
    }

    button {

        margin-top: 24px;

        background: white;

        color: black;

        font-weight: bold;

        cursor: pointer;

        transition: 0.2s;
    }

    button:hover {

        background: #dcdcdc;
    }

    .error {

        color: #ff5e5e;

        margin-top: 16px;

        font-size: 15px;
    }

    .score {

        margin-top: 20px;

        text-align: center;
    }

    .final-score {

        font-size: 54px;

        font-weight: bold;

        margin-top: 8px;
    }

    .score-message {

        margin-top: 12px;

        color: #cccccc;

        font-size: 16px;
    }

    .highlight-comment {
        background: white;
        color: black;
        padding: 4px 8px;
        border-radius: 4px;
    }

</style>
</head>

<body>

<canvas id="gameCanvas"></canvas>

<div class="container">

    <h1>
        ASTEROIDS<br>
        SCORE CALCULATOR
    </h1>

    <label for="collisions">
        Number of Collisions
    </label>

    <input
        type="text"
        id="collisions"
        placeholder="Enter a number"
        autocomplete="off"
    >

    <label for="coinsMissed">
        Coins Missed
    </label>

    <select id="coinsMissed">

        <option value="" selected>
            Select
        </option>

        <option value="0">
            0 (I got all of them!)
        </option>

        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>

    </select>

    <button onclick="calculateScore()">
        Calculate Score
    </button>

    <div class="error" id="error"></div>

    <div class="score" id="scoreDisplay"></div>

</div>

<script>

// ======================================================
// SCORE CALCULATION
// ======================================================

function calculateScore() {

    const collisionsInput =
        document.getElementById("collisions")
        .value
        .trim();

    const coinsMissedValue =
        document.getElementById("coinsMissed").value;

    const errorDiv =
        document.getElementById("error");

    const scoreDiv =
        document.getElementById("scoreDisplay");

    errorDiv.textContent = "";
    scoreDiv.innerHTML = "";

    // --------------------------------------------------
    // VALIDATION
    // --------------------------------------------------

    const integerPattern = /^[0-9]+$/;

    if (collisionsInput === "") {

        errorDiv.textContent =
            "Please enter the number of collisions.";

        return;
    }

    if (!integerPattern.test(collisionsInput)) {

        errorDiv.textContent =
            "Number of collisions must be a positive integer.";

        return;
    }

    const collisions =
        parseInt(collisionsInput);

    if (collisions < 0) {

        errorDiv.textContent =
            "Number of collisions cannot be negative.";

        return;
    }

    if (coinsMissedValue === "") {

        errorDiv.textContent =
            "Please select how many coins you missed.";

        return;
    }

    const coinsMissed =
        parseInt(coinsMissedValue);

    // --------------------------------------------------
    // LOGARITHMIC SCORE
    // --------------------------------------------------

    const collisionPenalty =
        Math.log2(collisions + 1) * 180;

    const coinPenalty =
        coinsMissed * 85;

    let score =
        1000 -
        collisionPenalty -
        coinPenalty;

    score = Math.round(
        Math.max(0, Math.min(1000, score))
    );

    // --------------------------------------------------
    // MESSAGE
    // --------------------------------------------------

    let message = "";

    if (score >= 900) {
        message = "Vector arcade legend.";
    }
    else if (score >= 700) {
        message = "Excellent piloting.";
    }
    else if (score >= 500) {
        message = "Strong survival skills.";
    }
    else if (score >= 300) {
        message = "You barely made it.";
    }
    else {
        message = "The asteroid field won.";
    }

    // --------------------------------------------------
    // DISPLAY
    // --------------------------------------------------

    scoreDiv.innerHTML = `

        <div>
            Your Final Score
        </div>

        <div class="final-score">
            ${score}
        </div>

        <div class="score-message">
            ${message}
            <br><br>
            <span class="highlight-comment">
                Go back to the video and comment your score!
            </span>
        </div>

    `;
}

// ======================================================
// BACKGROUND GAME
// ======================================================

const canvas =
    document.getElementById("gameCanvas");

const ctx =
    canvas.getContext("2d");

function resizeCanvas() {

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

resizeCanvas();

window.addEventListener(
    "resize",
    resizeCanvas
);

// ======================================================
// ASTEROIDS
// ======================================================

const asteroids = [];
const saucers = [];

class Asteroid {

    constructor() {

        this.size =
            50 + Math.random() * 70;

        const edge =
            Math.floor(Math.random() * 4);

        if (edge === 0) {
            this.x = Math.random() * canvas.width;
            this.y = -this.size;
        }
        else if (edge === 1) {
            this.x = Math.random() * canvas.width;
            this.y = canvas.height + this.size;
        }
        else if (edge === 2) {
            this.x = -this.size;
            this.y = Math.random() * canvas.height;
        }
        else {
            this.x = canvas.width + this.size;
            this.y = Math.random() * canvas.height;
        }

        const angle =
            Math.random() * Math.PI * 2;

        const speed =
            0.8 + Math.random() * 1.2;

        this.dx =
            Math.cos(angle) * speed;

        this.dy =
            Math.sin(angle) * speed;

        this.rotation =
            Math.random() * Math.PI * 2;

        this.rotationSpeed =
            (Math.random() - 0.5) * 0.01;

        this.points = [];

        const pointCount =
            12;

        for (let i = 0; i < pointCount; i++) {

            const a =
                (Math.PI * 2 / pointCount) * i;

            const radius =
                this.size *
                (0.7 + Math.random() * 0.3);

            this.points.push({
                angle: a,
                radius: radius
            });
        }
    }

    update() {

        this.x += this.dx;
        this.y += this.dy;

        this.rotation +=
            this.rotationSpeed;

        const r = this.size;

        if (this.x < -r)
            this.x = canvas.width + r;

        if (this.x > canvas.width + r)
            this.x = -r;

        if (this.y < -r)
            this.y = canvas.height + r;

        if (this.y > canvas.height + r)
            this.y = -r;
    }

    draw() {

        ctx.strokeStyle = "white";
        ctx.lineWidth = 2;

        ctx.beginPath();

        for (let i = 0; i < this.points.length; i++) {

            const p = this.points[i];

            const a =
                p.angle + this.rotation;

            const px =
                this.x +
                Math.cos(a) * p.radius;

            const py =
                this.y +
                Math.sin(a) * p.radius;

            if (i === 0)
                ctx.moveTo(px, py);
            else
                ctx.lineTo(px, py);
        }

        ctx.closePath();
        ctx.stroke();
    }
}

// ======================================================
// SAUCERS
// ======================================================

class Saucer {

    constructor() {

        this.scale =
            35 + Math.random() * 20;

        this.y =
            100 + Math.random() *
            (canvas.height - 200);

        this.bullets = [];

        if (Math.random() < 0.5) {

            this.x = -150;
            this.dx = 3 + Math.random() * 1.5;
        }
        else {

            this.x = canvas.width + 150;
            this.dx = -(3 + Math.random() * 1.5);
        }

        this.dy =
            (Math.random() - 0.5) * 0.5;

        this.fireTimer =
            50 + Math.random() * 100;
    }

    update() {

        this.x += this.dx;
        this.y += this.dy;

        if (this.y < 100 ||
            this.y > canvas.height - 100) {

            this.dy *= -1;
        }

        this.fireTimer--;

        if (this.fireTimer <= 0) {

            this.fireTimer =
                60 + Math.random() * 100;

            const angle =
                Math.random() *
                Math.PI * 2;

            this.bullets.push({

                x: this.x,
                y: this.y,

                dx: Math.cos(angle) * 8,
                dy: Math.sin(angle) * 8
            });
        }

        for (const b of this.bullets) {

            b.x += b.dx;
            b.y += b.dy;
        }

        this.bullets =
            this.bullets.filter(b =>
                b.x > -100 &&
                b.x < canvas.width + 100 &&
                b.y > -100 &&
                b.y < canvas.height + 100
            );
    }

    draw() {

        const x = this.x;
        const y = this.y;
        const s = this.scale;

        ctx.strokeStyle = "white";
        ctx.lineWidth = 2;

        ctx.beginPath();

        ctx.moveTo(x - s * 0.35, y - s * 0.15);
        ctx.lineTo(x - s * 0.20, y - s * 0.45);
        ctx.lineTo(x + s * 0.20, y - s * 0.45);
        ctx.lineTo(x + s * 0.35, y - s * 0.15);

        ctx.stroke();

        ctx.beginPath();

        ctx.moveTo(x - s * 0.60, y - s * 0.15);
        ctx.lineTo(x - s * 0.95, y + s * 0.30);
        ctx.lineTo(x + s * 0.95, y + s * 0.30);
        ctx.lineTo(x + s * 0.60, y - s * 0.15);
        ctx.closePath();

        ctx.stroke();

        ctx.beginPath();

        ctx.moveTo(x - s * 0.60, y - s * 0.15);
        ctx.lineTo(x + s * 0.60, y - s * 0.15);

        ctx.stroke();

        for (const b of this.bullets) {

            ctx.beginPath();

            ctx.arc(
                b.x,
                b.y,
                2,
                0,
                Math.PI * 2
            );

            ctx.fillStyle = "white";
            ctx.fill();
        }
    }
}

// ======================================================
// INITIAL OBJECTS
// ======================================================

for (let i = 0; i < 16; i++) {
    asteroids.push(new Asteroid());
}

for (let i = 0; i < 3; i++) {
    saucers.push(new Saucer());
}

// ======================================================
// ANIMATION LOOP
// ======================================================

function animate() {

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    for (const asteroid of asteroids) {

        asteroid.update();
        asteroid.draw();
    }

    for (const saucer of saucers) {

        saucer.update();
        saucer.draw();
    }

    requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
